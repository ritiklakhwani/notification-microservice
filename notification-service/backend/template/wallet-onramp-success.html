<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet Onramp Successful</title>
  </head>
  <body style="margin: 0; font-family: Arial, sans-serif; background-color: #f7fee7; color: #111827;">
    <div style="max-width: 600px; margin: 0 auto; padding: 32px;">
      <div style="background-color: #ffffff; border-radius: 12px; padding: 32px; border: 1px solid #d9f99d;">
        <h1 style="margin: 0 0 16px; color: #65a30d; font-size: 24px;">Wallet Updated</h1>
        <p style="margin: 0 0 16px; font-size: 16px; line-height: 1.6;">
          Hi {{username}}, your wallet onramp of <strong>{{amount}}</strong> was successful.
        </p>
        <p style="margin: 0; font-size: 14px; color: #6b7280;">
          Thank you for using our payment service.
        </p>
      </div>
    </div>
  </body>
</html>
