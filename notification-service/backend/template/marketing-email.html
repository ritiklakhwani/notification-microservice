<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
  </head>
  <body style="margin: 0; font-family: Arial, sans-serif; background-color: #fff7ed; color: #111827;">
    <div style="max-width: 600px; margin: 0 auto; padding: 32px;">
      <div style="background-color: #ffffff; border-radius: 12px; padding: 32px; border: 1px solid #fed7aa;">
        <h1 style="margin: 0 0 16px; color: #ea580c; font-size: 24px;">{{title}}</h1>
        <p style="margin: 0 0 16px; font-size: 16px; line-height: 1.6;">
          Hello {{username}},
        </p>
        <p style="margin: 0; font-size: 16px; line-height: 1.6;">
          {{message}}
        </p>
      </div>
    </div>
  </body>
</html>
